name: CI

on:
  push:
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check acceptance_checker tests smoketest.py

      - name: Mypy type check
        run: mypy acceptance_checker

      - name: Pytest
        run: pytest -q

      - name: Smoketest (offscreen Qt)
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxkbcommon0 libdbus-1-3
          python smoketest.py
